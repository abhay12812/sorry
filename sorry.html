<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

p{
    font-size:18px;
    color:#444;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e63956;
}

.heart{
    font-size:40px;
    display:none;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>I'm Really Sorry 😔</h1>
    <p id="message">
        I didn't mean to hurt you.  
        Our friendship means a lot to me.  
        Please forgive me. 🙏
    </p>

    <button onclick="showLove()">Click if you forgive me ❤️</button>

    <div class="heart" id="heart">❤️ Thank You!</div>
</div>

<script>
function showLove(){
    document.getElementById("heart").style.display="block";
}
</script>

</body>
</html>
